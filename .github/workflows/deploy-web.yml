name: Deploy BannerPrint Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔍 DEBUG — чтобы больше не гадать
      - name: Debug files
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== WEB ==="
          ls -la web || true

      # 🚀 Копируем ВСЁ (самый надёжный способ)
      - name: Upload project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/home/bannerweb/banner_web"

      # 🔁 Деплой
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/bannerweb/banner_web/web

            echo "=== Сборка образа ==="
            docker compose build api

            echo "=== Перезапуск контейнеров ==="
            docker compose up -d --force-recreate --remove-orphans

            echo "=== Очистка старых образов ==="
            docker image prune -f

            echo "=== Health check (до 60 сек) ==="
            for i in $(seq 1 12); do
              sleep 5
              if docker exec bannerprint_api python -c \
                "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/api/health'); sys.exit(0 if b'ok' in r.read() else 1)" 2>/dev/null; then
                echo "✅ Деплой успешен"
                exit 0
              fi
              echo "⏳ Попытка $i/12..."
            done

            echo "❌ Health check не прошёл"
            docker compose logs --tail=50 api
            exit 1
