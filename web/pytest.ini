[pytest]
# Корень проекта: запускаем из репо, тесты в web/tests/
testpaths = web/tests
asyncio_mode = auto

# Минимальный вывод — только провалы и summary
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings

# Маркеры
markers =
    slow: тесты, требующие реального рендера (пропускаем в CI без GS)
