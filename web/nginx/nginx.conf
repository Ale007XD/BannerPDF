# ============================================================
# BannerPrint — nginx/nginx.conf
# Rate limit зоны объявляются здесь (в http-блоке),
# server-блок подключается из default.conf
# ============================================================

user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ---- Rate limit зоны ----
    # preview: 30 req/min = 0.5 req/sec
    limit_req_zone $binary_remote_addr zone=preview_limit:10m rate=30r/m;

    # order: 5 req/min
    limit_req_zone $binary_remote_addr zone=order_limit:10m rate=5r/m;

    # download: 10 req/min/IP (защита от брутфорса токенов)
    limit_req_zone $binary_remote_addr zone=download_limit:10m rate=10r/m;

    include /etc/nginx/conf.d/*.conf;
}
