# ============================================================
# BannerPrint — nginx/default.conf
# Реверс-прокси + статика + rate limits
# Порт 443 занят amnezia-xray — слушаем 8444
# Rate limit зоны объявлены в nginx.conf (http-блок)
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name bannerbot.ru www.bannerbot.ru;

    return 301 https://$host:8444$request_uri;
}

server {
    listen 8444 ssl http2;
    listen [::]:8444 ssl http2;
    server_name bannerbot.ru www.bannerbot.ru;

    ssl_certificate     /etc/letsencrypt/live/bannerbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bannerbot.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/bannerprint_access.log;
    error_log  /var/log/nginx/bannerprint_error.log;

    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer;

    root /app/frontend;
    index index.html;

    # Админка — отдельный SPA из /app/frontend/admin/
    # Закрыта авторизацией на уровне JS (Bearer ADMIN_TOKEN).
    location /admin/ {
        alias /app/frontend/admin/;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(css|js|woff2?|ttf|png|jpg|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(css|js|woff2?|ttf|png|jpg|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    location /api/preview {
        limit_req zone=preview_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/order {
        limit_req zone=order_limit burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/download/ {
        limit_req zone=download_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/payment/callback {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}

# ------------------------------------------------------------
# Порт 88 — только для Telegram webhook
# Telegram разрешает: 80, 88, 443, 8443
# ------------------------------------------------------------
server {
    listen 88 ssl;
    listen [::]:88 ssl;
    server_name bannerbot.ru www.bannerbot.ru;

    ssl_certificate     /etc/letsencrypt/live/bannerbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bannerbot.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Принимаем только POST /api/tg/callback — всё остальное 444
    location = /api/tg/callback {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location / {
        return 444;
    }
}
