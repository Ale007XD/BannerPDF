# ============================================================
# BannerPrint — nginx/default.conf
# Реверс-прокси + статика + rate limits
# ============================================================

# Rate limit зоны (объявляются в http-блоке, но в Docker
# Nginx читает этот файл как единственный конфиг — поэтому
# зоны объявляем здесь через include или прямо в server)
# При использовании docker-compose nginx образа — зоны
# объявляются в nginx.conf через include этого файла.
# Здесь используем inline-объявление через geo/map trick
# или выносим в отдельный файл rate_limit_zones.conf (включается первым).

# Статика отдаётся Nginx напрямую (без FastAPI)
# API проксируется на uvicorn :8000

server {
    listen 80;
    listen [::]:80;
    server_name bannerprintbot.ru www.bannerprintbot.ru;

    # Редирект на HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bannerprintbot.ru www.bannerprintbot.ru;

    ssl_certificate     /etc/letsencrypt/live/bannerprintbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bannerprintbot.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/bannerprint_access.log;
    error_log  /var/log/nginx/bannerprint_error.log;

    # Размер тела запроса (для превью с текстом)
    client_max_body_size 1m;

    # Заголовки безопасности
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer;

    # ---- Статика фронтенда ----
    root /app/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Кэширование статики
        location ~* \.(css|js|woff2?|ttf|png|jpg|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- API: превью (30 req/min, burst=5) ----
    location /api/preview {
        limit_req zone=preview_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ---- API: создание заказа (5 req/min, burst=2) ----
    location /api/order {
        limit_req zone=order_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ---- API: скачивание PDF (10 req/min/IP, burst=3) ----
    location /api/download/ {
        limit_req zone=download_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;   # PDF рендеринг может занять время
    }

    # ---- Webhook (без rate limit — Tona сам не спамит) ----
    location /api/payment/callback {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ---- Остальной API ----
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
