server {
    listen 80;
    listen [::]:80;
    server_name bannerbot.ru www.bannerbot.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bannerbot.ru www.bannerbot.ru;

    ssl_certificate     /etc/letsencrypt/live/bannerbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bannerbot.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/bannerprint_access.log;
    error_log  /var/log/nginx/bannerprint_error.log;

    client_max_body_size 1m;

    root /app/frontend;
    index index.html;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer;

    location / {
        try_files $uri $uri/ /index.html;
        location ~* \.(css|js|woff2?|ttf|png|jpg|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    location /admin/ {
        alias /app/frontend/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # API эндпоинты
    location /api/preview {
        limit_req zone=preview_limit burst=5 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/order {
        limit_req zone=order_limit burst=2 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/download/ {
        limit_req zone=download_limit burst=3 nodelay;
        proxy_pass http://api:8000;
        proxy_read_timeout 300s; # Увеличили для генерации тяжелых PDF
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 88 ssl;
    http2 on;
    server_name bannerbot.ru;

    ssl_certificate     /etc/letsencrypt/live/bannerbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bannerbot.ru/privkey.pem;

    location = /api/tg/callback {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / { return 444; }
}
