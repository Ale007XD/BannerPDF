services:
  api:
    build: .
    container_name: bannerprint_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - bannerprint_data:/app/data
      - ./fonts:/app/fonts:ro
      - ./profiles:/profiles:ro
      - ./templates.json:/app/templates.json:ro
    expose:
      - "8000"
    networks:
      - bannerprint_net

  nginx_web:
    image: nginx:1.25-alpine
    container_name: bannerprint_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "88:88"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params:/etc/nginx/conf.d/proxy_params:ro
      - ./frontend:/app/frontend:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    networks:
      - bannerprint_net
    depends_on:
      - api

volumes:
  bannerprint_data:
    name: bannerprint_data

networks:
  bannerprint_net:
    name: bannerprint_net
    
